<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符圖文對照練習</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* 視覺跳動區域 */
        .stage {
            width: 100%; max-width: 400px; height: 120px; border-bottom: 6px solid #2c3e50;
            position: relative; margin-bottom: 30px; background: #fff; border-radius: 15px;
        }
        .ball {
            width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #5dade2, #2e86c1);
            border-radius: 50%; position: absolute; left: calc(50% - 22.5px); bottom: 0;
            animation: bounce var(--speed, 1s) infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { bottom: 0; transform: scaleY(0.85); }
            50% { bottom: 80px; transform: scaleY(1); }
        }

        /* 音符清單容器 */
        .note-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; }
        
        /* 按鈕基本樣式 */
        .note-row {
            display: flex; align-items: center; background: white; padding: 15px 20px;
            border-radius: 15px; border: 2px solid #d5dbdb; cursor: pointer; transition: 0.2s;
        }
        .note-row:hover { background: #fdfefe; border-color: #3498db; }
        .note-row.active { border-color: #27ae60; background: #e9f7ef; transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 左側音符符號 */
        .symbol { font-size: 4rem; width: 80px; text-align: center; margin-right: 15px; line-height: 1; }
        
        /* 右側文字資訊 */
        .info { display: flex; flex-direction: column; }
        .name { font-size: 1.6rem; font-weight: bold; color: #2c3e50; }
        .desc { font-size: 1rem; color: #7f8c8d; margin-top: 4px; }

        /* 不同音符的色彩標記 */
        .c-whole { color: #e74c3c; border-left: 10px solid #e74c3c; }
        .c-half { color: #f39c12; border-left: 10px solid #f39c12; }
        .c-quarter { color: #27ae60; border-left: 10px solid #27ae60; }
        .c-eighth { color: #8e44ad; border-left: 10px solid #8e44ad; }
    </style>
</head>
<body>

    <h1 style="color:#2c3e50;">🎵 音符看一看、聽一聽</h1>
    
    <div class="stage">
        <div class="ball" id="ball"></div>
    </div>

    <div class="note-container">
        <div class="note-row c-whole" onclick="play(4, '全音符', this)">
            <div class="symbol">𝅝</div>
            <div class="info">
                <span class="name">全音符</span>
                <span class="desc">長長的音 (4拍)</span>
            </div>
        </div>

        <div class="note-row c-half" onclick="play(2, '二分音符', this)">
            <div class="symbol">𝅗𝅥</div>
            <div class="info">
                <span class="name">二分音符</span>
                <span class="desc">慢走 (2拍)</span>
            </div>
        </div>

        <div class="note-row c-quarter" onclick="play(1, '四分音符', this)">
            <div class="symbol">𝅘𝅥</div>
            <div class="info">
                <span class="name">四分音符</span>
                <span class="desc">踏步 (1拍)</span>
            </div>
        </div>

        <div class="note-row c-eighth" onclick="play(0.5, '八分音符', this)">
            <div class="symbol">𝅘𝅥𝅮</div>
            <div class="info">
                <span class="name">八分音符</span>
                <span class="desc">快快跑 (0.5拍)</span>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let loop = null;

        function play(sec, label, el) {
            // 切換 active 狀態
            document.querySelectorAll('.note-row').forEach(row => row.classList.remove('active'));
            el.classList.add('active');

            // 調整球跳動的速度
            document.documentElement.style.setProperty('--speed', `${sec}s`);

            // 重啟聲音循環
            if(loop) clearInterval(loop);
            sound(); // 點擊當下先響
            loop = setInterval(sound, sec * 1000);
        }

        function sound() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 音
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
