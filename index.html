<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂節奏視覺化教學 - 白色清晰穩定版</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #f9f9f9;
            --border-light: #e0e0e0;
            --text-dark: #2c3e50;
            --accent-green: #1eae5e;
            --button-inactive: #ffffff;
            --panel-footer: #34495e;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { text-align: center; margin: 0; font-size: 22px; }

        /* 畫布樣式 */
        #visualizer {
            width: 100%;
            height: 300px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            display: block;
        }

        /* 模式按鈕 */
        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0;
        }

        button.mode-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--border-light);
            border-radius: 30px;
            background: var(--button-inactive);
            color: var(--text-dark);
            transition: all 0.2s;
        }

        button.mode-btn.active {
            background-color: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
            box-shadow: 0 4px 10px rgba(30, 174, 94, 0.3);
        }

        .note-icon { width: 20px; height: 20px; fill: currentColor; }

        /* 底部控制台 */
        .footer-console {
            background: var(--panel-footer);
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .setting-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .setting-item { display: flex; align-items: center; gap: 8px; }
        
        .bpm-slider { width: 120px; cursor: pointer; }
        .bpm-value { color: var(--accent-green); font-weight: bold; min-width: 60px; }
        
        select { padding: 6px 12px; border-radius: 8px; border: none; font-weight: bold; }

        #audioBtn {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            background: #e74c3c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎶 音樂節奏視覺化教學</h2>
    
    <canvas id="visualizer"></canvas>

    <div class="controls">
        <button class="mode-btn" id="btn-whole" onclick="setNote('whole')">
            <div id="icon-whole"></div> 全音符 (4拍)
        </button>
        <button class="mode-btn" id="btn-half" onclick="setNote('half')">
            <div id="icon-half"></div> 二分音符 (2拍)
        </button>
        <button class="mode-btn active" id="btn-quarter" onclick="setNote('quarter')">
            <div id="icon-quarter"></div> 四分音符 (1拍)
        </button>
        <button class="mode-btn" id="btn-eighth" onclick="setNote('eighth')">
            <div id="icon-eighth"></div> 八分音符 (0.5拍)
        </button>
    </div>

    <div class="footer-console">
        <div class="setting-group">
            <div class="setting-item">
                <label>速度</label>
                <input type="range" id="bpmRange" min="30" max="240" value="60" class="bpm-slider">
                <span class="bpm-value" id="bpmDisplay">60 BPM</span>
            </div>
            <div class="setting-item">
                <label>音色</label>
                <select id="soundType">
                    <option value="woodblock">電子木魚</option>
                    <option value="drum">重低音鼓</option>
                    <option value="water">清脆水滴</option>
                    <option value="piano">鋼琴短音</option>
                </select>
            </div>
        </div>
        <button id="audioBtn" onclick="toggleAudio()">🔇 點擊開啟聲音系統</button>
    </div>
</div>

<script>
    // SVG 圖標數據
    const svgData = {
        whole: `<svg class="note-icon" viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="35" ry="22" stroke="currentColor" stroke-width="10" fill="none"/></svg>`,
        half: `<svg class="note-icon" viewBox="0 0 100 100"><ellipse cx="40" cy="70" rx="20" ry="14" stroke="currentColor" stroke-width="8" fill="none"/><line x1="60" y1="70" x2="60" y2="20" stroke="currentColor" stroke-width="8"/></svg>`,
        quarter: `<svg class="note-icon" viewBox="0 0 100 100"><ellipse cx="40" cy="70" rx="20" ry="14" fill="currentColor"/><line x1="60" y1="70" x2="60" y2="20" stroke="currentColor" stroke-width="8"/></svg>`,
        eighth: `<svg class="note-icon" viewBox="0 0 100 100"><ellipse cx="40" cy="70" rx="20" ry="14" fill="currentColor"/><line x1="60" y1="70" x2="60" y2="20" stroke="currentColor" stroke-width="8"/><path d="M60 20 Q 85 30 85 55" stroke="currentColor" stroke-width="8" fill="none"/></svg>`
    };

    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const bpmRange = document.getElementById('bpmRange');
    const bpmDisplay = document.getElementById('bpmDisplay');
    const audioBtn = document.getElementById('audioBtn');
    const soundSelect = document.getElementById('soundType');

    let audioCtx = null;
    let isAudioEnabled = false;
    let bpm = 60;
    let currentMode = 'quarter';
    let startTime = performance.now() / 1000;
    let lastCycle = -1;

    const durations = { whole: 4, half: 2, quarter: 1, eighth: 0.5 };

    function init() {
        Object.keys(svgData).forEach(key => {
            document.getElementById('icon-' + key).innerHTML = svgData[key];
        });
        resize();
        requestAnimationFrame(draw);
    }

    function toggleAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isAudioEnabled = !isAudioEnabled;
        audioBtn.innerText = isAudioEnabled ? "🔊 聲音已開啟" : "🔇 點擊開啟聲音系統";
        audioBtn.style.background = isAudioEnabled ? "#1eae5e" : "#e74c3c";
    }

    function setNote(mode) {
        currentMode = mode;
        startTime = performance.now() / 1000;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
    }

    bpmRange.oninput = function() {
        bpm = this.value;
        bpmDisplay.innerText = bpm + " BPM";
    };

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * dpr;
        canvas.height = canvas.offsetHeight * dpr;
        ctx.scale(dpr, dpr);
    }

    function playSound() {
        if (!isAudioEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const now = audioCtx.currentTime;
        const type = soundSelect.value;

        if (type === 'woodblock') {
            osc.frequency.setValueAtTime(880, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        } else if (type === 'drum') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(100, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        } else {
            osc.frequency.setValueAtTime(523, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        }

        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
    }

    function draw() {
        const now = performance.now() / 1000;
        const cycleSec = (60 / bpm) * durations[currentMode];
        const progress = ((now - startTime) % cycleSec) / cycleSec;

        const currentCycle = Math.floor((now - startTime) / cycleSec);
        if (currentCycle !== lastCycle) { playSound(); lastCycle = currentCycle; }

        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ctx.clearRect(0, 0, w, h);

        const ground = h * 0.8;
        const peak = h * 0.2;
        const jumpH = ground - peak;

        let y;
        if (progress < 0.5) {
            y = ground - Math.sin(progress * 2 * (Math.PI / 2)) * jumpH;
        } else {
            y = peak + (1 - Math.cos((progress - 0.5) * 2 * (Math.PI / 2))) * jumpH;
        }

        // 繪製陰影
        const sScale = 1 - (ground - y) / jumpH;
        ctx.beginPath();
        ctx.ellipse(w/2, ground + 20, 20 * sScale, 5, 0, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,0,0,${0.15 * sScale})`;
        ctx.fill();

        // 繪製圓點 (強化立體感)
        const grad = ctx.createRadialGradient(w/2 - 8, y - 8, 5, w/2, y, 25);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(1, '#d0d0d0');
        
        ctx.beginPath();
        ctx.arc(w/2, y, 25, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.fill();
        
        // 畫一個深色細邊框
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.shadowBlur = 0; // 重置陰影避免影響其他繪圖

        requestAnimationFrame(draw);
    }

    window.onload = init;
    window.onresize = resize;
</script>

</body>
</html>
